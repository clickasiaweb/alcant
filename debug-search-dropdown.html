<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Dropdown Debug</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .search-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .debug-section {
            background: #f5f5f5;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .product-item {
            border: 1px solid #ddd;
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
            background: white;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .loading { background: #fff3cd; }
        .success { background: #d4edda; }
        .error { background: #f8d7da; }
    </style>
</head>
<body>
    <h1>Search Dropdown Debug</h1>
    
    <input type="text" id="searchInput" class="search-input" placeholder="Type '19 pro' to test..." value="">
    
    <div class="debug-section">
        <h3>Debug Info</h3>
        <div id="debugInfo"></div>
    </div>
    
    <div class="debug-section">
        <h3>Search Results</h3>
        <div id="results"></div>
    </div>

    <script>
        // Simulate SearchDropdown logic
        let searchQuery = '';
        let searchResults = [];
        let isSearching = false;
        let searchTimeout = null;
        
        const API_BASE_URL = 'https://alcant-backend.vercel.app/api';
        
        // Category cache
        let categoryCache = null;
        let categoryCachePromise = null;
        let categoryCacheTimestamp = 0;
        const CACHE_DURATION = 5 * 60 * 1000;
        
        const getCategories = async () => {
            const now = Date.now();
            if (categoryCache && (now - categoryCacheTimestamp) < CACHE_DURATION) {
                return categoryCache;
            }
            if (categoryCachePromise) return categoryCachePromise;
            
            categoryCachePromise = (async () => {
                try {
                    const response = await fetch(`${API_BASE_URL}/categories`);
                    if (!response.ok) throw new Error('Failed to fetch categories');
                    const data = await response.json();
                    const categories = data.categories || [];
                    const categoryMap = {};
                    categories.forEach(cat => {
                        categoryMap[cat.id] = cat.name;
                    });
                    categoryCache = categoryMap;
                    categoryCacheTimestamp = now;
                    return categoryMap;
                } catch (error) {
                    console.error('Failed to fetch categories:', error);
                    return {};
                }
            })();
            return categoryCachePromise;
        };
        
        // Simulate searchService.searchProducts
        const searchProducts = async (query) => {
            console.log('=== SEARCH PRODUCTS DEBUG ===');
            console.log('Search query:', query);
            
            if (!query || query.trim().length < 2) {
                console.log('Query too short, returning empty array');
                return [];
            }
            
            const url = `${API_BASE_URL}/products/search?q=${encodeURIComponent(query.trim())}&limit=5`;
            console.log('Search URL:', url);
            
            const response = await fetch(url);
            console.log('Response status:', response.status);
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const data = await response.json();
            console.log('API response:', data);
            
            // Get category mapping
            const categoryMap = await getCategories();
            console.log('Category mapping:', categoryMap);
            
            // Transform products
            const transformedResults = (data.products || []).map(product => {
                const categoryName = categoryMap[product.category] || 'Unknown';
                return {
                    id: product.id || product._id,
                    name: product.name,
                    category: categoryName,
                    price: product.price || product.final_price || 0,
                    image: product.image || product.images?.[0] || 'https://picsum.photos/seed/product/60/60.jpg',
                    slug: product.slug,
                    description: product.description,
                    rating: product.rating || 0,
                    reviews: product.reviews || 0,
                    isNew: product.is_new || false,
                    discount: product.old_price ? Math.round((1 - product.price / product.old_price) * 100) : 0
                };
            });
            
            console.log('Transformed results:', transformedResults);
            return transformedResults;
        };
        
        // Simulate handleSearch
        const handleSearch = async (query) => {
            console.log('=== HANDLE SEARCH DEBUG ===');
            console.log('Input query:', query);
            
            searchQuery = query;
            
            if (!query || query.trim().length < 2) {
                console.log('Query too short, clearing results');
                searchResults = [];
                isSearching = false;
                updateUI();
                return;
            }
            
            isSearching = true;
            updateUI();
            
            try {
                const results = await searchProducts(query);
                console.log('Search results received:', results);
                searchResults = results;
            } catch (error) {
                console.error('Search error:', error);
                searchResults = [];
            } finally {
                isSearching = false;
                updateUI();
            }
        };
        
        // Update UI
        function updateUI() {
            const debugDiv = document.getElementById('debugInfo');
            const resultsDiv = document.getElementById('results');
            
            debugDiv.innerHTML = `
                <div class="status ${isSearching ? 'loading' : 'success'}">
                    <strong>Search Query:</strong> "${searchQuery}"<br>
                    <strong>Query Length:</strong> ${searchQuery.length}<br>
                    <strong>Is Searching:</strong> ${isSearching}<br>
                    <strong>Results Count:</strong> ${searchResults.length}<br>
                    <strong>Query Length >= 2:</strong> ${searchQuery.length >= 2}
                </div>
            `;
            
            if (isSearching) {
                resultsDiv.innerHTML = '<div class="status loading">Searching...</div>';
            } else if (searchQuery.length >= 2) {
                if (searchResults.length > 0) {
                    const productsHtml = searchResults.map(product => `
                        <div class="product-item">
                            <strong>${product.name}</strong><br>
                            Category: ${product.category}<br>
                            Price: $${product.price}<br>
                            ${product.rating ? `Rating: ${product.rating}` : ''}
                        </div>
                    `).join('');
                    
                    resultsDiv.innerHTML = `
                        <div class="status success">Found ${searchResults.length} products:</div>
                        ${productsHtml}
                    `;
                } else {
                    resultsDiv.innerHTML = '<div class="status error">No products found</div>';
                }
            } else {
                resultsDiv.innerHTML = '<div class="status">Type at least 2 characters to search</div>';
            }
        }
        
        // Handle input with debouncing
        document.getElementById('searchInput').addEventListener('input', function(e) {
            const value = e.target.value;
            console.log('Input changed:', value);
            
            // Clear existing timeout
            if (searchTimeout) {
                clearTimeout(searchTimeout);
            }
            
            // Don't search if too short
            if (value.trim().length < 2) {
                handleSearch('');
                return;
            }
            
            // Debounce search
            searchTimeout = setTimeout(() => {
                console.log('Debounce timer fired');
                handleSearch(value);
            }, 300);
        });
        
        // Initial state
        updateUI();
    </script>
</body>
</html>
