<!DOCTYPE html>
<html>
<head>
    <title>Test Signup</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Supabase Signup Test</h1>
    <form id="signupForm">
        <input type="email" id="email" placeholder="Email" required><br><br>
        <input type="text" id="name" placeholder="Name" required><br><br>
        <input type="password" id="password" placeholder="Password" required><br><br>
        <button type="submit">Sign Up</button>
    </form>
    <div id="result"></div>

    <script>
        const { createClient } = supabase;
        const supabase = createClient(
            'https://orhcxgmjychxcrqqwcqu.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJleHAiOiJzdXBhYmFzZSIsInRleCIsImUiOiJJzdXBhYmFzZSIsInRleCIsImUiLCJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJleHAiOiJzdXBhYmFzZSIsInRleCIsImUiOiJJzdXBhYmFzZSIsInRleCIsImUiLCJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJleHAiOiJzdXBhYmFzZSIsInRleCIsImUiLCJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9'
        );

        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const name = document.getElementById('name').value;
            const password = document.getElementById('password').value;
            
            try {
                console.log('Attempting signup with:', { email, name });
                
                const { data, error } = await supabase.auth.signUp({
                    email,
                    password,
                    options: {
                        data: {
                            name: name
                        }
                    }
                });

                if (error) {
                    document.getElementById('result').innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
                } else {
                    document.getElementById('result').innerHTML = `<p style="color: green;">Success! User created: ${data.user?.email}</p>`;
                    console.log('User created:', data.user);
                }
            } catch (err) {
                document.getElementById('result').innerHTML = `<p style="color: red;">Exception: ${err.message}</p>`;
            }
        });
    </script>
</body>
</html>
