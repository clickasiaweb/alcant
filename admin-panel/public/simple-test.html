<!DOCTYPE html>
<html>
<head>
    <title>Simple Download Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #status { margin-top: 20px; padding: 10px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Excel Template Download Test</h1>
    <button onclick="testDownload()">Download Template</button>
    <div id="status"></div>

    <script>
        async function testDownload() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = 'Testing download...';
            statusDiv.className = '';
            
            try {
                console.log('Testing template download...');
                
                // Test 1: Direct fetch
                console.log('Test 1: Direct fetch to http://localhost:5001/api/bulk-upload/template');
                const response = await fetch('http://localhost:5001/api/bulk-upload/template');
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                console.log('Response ok:', response.ok);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status} ${response.statusText}`);
                }
                
                const blob = await response.blob();
                console.log('Blob created, size:', blob.size);
                
                // Create download
                const url = window.URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'product-upload-template.xlsx';
                document.body.appendChild(link);
                link.click();
                link.remove();
                window.URL.revokeObjectURL(url);
                
                statusDiv.innerHTML = '✅ Template downloaded successfully!';
                statusDiv.className = 'success';
                
            } catch (error) {
                console.error('Download failed:', error);
                statusDiv.innerHTML = `❌ Error: ${error.message}`;
                statusDiv.className = 'error';
            }
        }
    </script>
</body>
</html>
