<!DOCTYPE html>
<html>
<head>
    <title>Axios Test</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        button { padding: 15px 30px; font-size: 18px; background: #6f42c1; color: white; border: none; border-radius: 8px; cursor: pointer; }
        #status { margin-top: 20px; padding: 15px; border-radius: 8px; font-weight: bold; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #e2e3e2; color: #1a1a1a; }
    </style>
</head>
<body>
    <h1>🔄 Axios Download Test</h1>
    <button onclick="testAxios()">Test Download with Axios</button>
    <div id="status" class="info">Click button to test axios download...</div>

    <script>
        async function testAxios() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = 'Testing axios download...';
            statusDiv.className = 'info';
            
            try {
                console.log('Starting axios test...');
                
                const response = await axios.get('http://localhost:5001/api/bulk-upload/template', {
                    responseType: 'blob'
                });
                
                console.log('Axios response:', response);
                console.log('Response status:', response.status);
                console.log('Response data:', response.data);
                
                // Create download
                const url = window.URL.createObjectURL(new Blob([response.data]));
                const link = document.createElement('a');
                link.href = url;
                link.setAttribute('download', 'product-upload-template.xlsx');
                document.body.appendChild(link);
                link.click();
                link.remove();
                window.URL.revokeObjectURL(url);
                
                statusDiv.innerHTML = '✅ Success! Downloaded with axios!';
                statusDiv.className = 'success';
                
            } catch (error) {
                console.error('Axios error:', error);
                statusDiv.innerHTML = `❌ Axios Error: ${error.message}`;
                statusDiv.className = 'error';
            }
        }
    </script>
</body>
</html>
