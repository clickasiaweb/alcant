<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Icon Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .result {
            background: #f0f8ff;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
        }
        .error {
            background: #ffe6e6;
            padding: 10px;
            margin: 10px 0;
            border-radius: 4px;
            color: #d00;
        }
        button {
            padding: 8px 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
    </style>
</head>
<body>
    <h1>Search Icon Functionality Test</h1>
    
    <div class="test-section">
        <h2>Test Search Service</h2>
        <button onclick="testSearch('wallet')">Test Search: wallet</button>
        <button onclick="testSearch('phone')">Test Search: phone</button>
        <button onclick="testSearch('leather')">Test Search: leather</button>
        <div id="searchResults"></div>
    </div>

    <div class="test-section">
        <h2>Test Categories</h2>
        <button onclick="testCategories()">Test Categories API</button>
        <div id="categoryResults"></div>
    </div>

    <script>
        const API_BASE_URL = 'https://alcant-backend.vercel.app/api';
        let categoryCache = null;

        // Test search service
        async function testSearch(query) {
            const resultsDiv = document.getElementById('searchResults');
            resultsDiv.innerHTML = '<div class="result">Searching...</div>';
            
            try {
                if (!query || query.trim().length < 2) {
                    resultsDiv.innerHTML = '<div class="error">Please enter at least 2 characters</div>';
                    return;
                }

                const url = `${API_BASE_URL}/products/search?q=${encodeURIComponent(query.trim())}&limit=5`;
                console.log('Testing search URL:', url);

                const response = await fetch(url);
                console.log('Response status:', response.status);

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('API response:', data);
                
                // Get category mapping
                const categoryMap = await getCategories();
                
                // Transform product data
                const transformedResults = (data.products || []).map(product => {
                    const categoryName = categoryMap[product.category] || 'Unknown';
                    return {
                        id: product.id || product._id,
                        name: product.name,
                        category: categoryName,
                        price: product.price || product.final_price || 0,
                        image: product.image || product.images?.[0] || 'https://picsum.photos/seed/product/60/60.jpg',
                        slug: product.slug,
                        description: product.description,
                        rating: product.rating || 0,
                        reviews: product.reviews || 0,
                        isNew: product.is_new || false,
                        discount: product.old_price ? Math.round((1 - product.price / product.old_price) * 100) : 0
                    };
                });
                
                console.log('Transformed results:', transformedResults);

                if (transformedResults.length > 0) {
                    const productsHtml = transformedResults.map(product => `
                        <div class="result">
                            <strong>${product.name}</strong><br>
                            Category: ${product.category}<br>
                            Price: $${product.price}<br>
                            ${product.rating ? `Rating: ${product.rating}` : ''}
                        </div>
                    `).join('');
                    
                    resultsDiv.innerHTML = `
                        <div class="result">Found ${transformedResults.length} products for "${query}":</div>
                        ${productsHtml}
                    `;
                } else {
                    resultsDiv.innerHTML = `<div class="error">No products found for "${query}"</div>`;
                }
            } catch (error) {
                console.error('Search error:', error);
                resultsDiv.innerHTML = `<div class="error">Search failed: ${error.message}</div>`;
            }
        }

        // Test categories
        async function testCategories() {
            const resultsDiv = document.getElementById('categoryResults');
            resultsDiv.innerHTML = '<div class="result">Fetching categories...</div>';
            
            try {
                if (categoryCache) return categoryCache;
                
                const response = await fetch(`${API_BASE_URL}/categories`);
                if (!response.ok) throw new Error('Failed to fetch categories');
                
                const data = await response.json();
                const categories = data.categories || [];
                
                // Create UUID to name mapping
                const categoryMap = {};
                categories.forEach(cat => {
                    categoryMap[cat.id] = cat.name;
                });
                
                categoryCache = categoryMap;
                
                const categoriesHtml = Object.entries(categoryMap).map(([id, name]) => 
                    `<div class="result">${id} = ${name}</div>`
                ).join('');
                
                resultsDiv.innerHTML = `
                    <div class="result">Found ${categories.length} categories:</div>
                    ${categoriesHtml}
                `;
                
                return categoryMap;
            } catch (error) {
                console.error('Categories error:', error);
                resultsDiv.innerHTML = `<div class="error">Categories failed: ${error.message}</div>`;
                return {};
            }
        }

        // Auto-test on page load
        window.addEventListener('load', () => {
            console.log('Page loaded, ready for testing');
        });
    </script>
</body>
</html>
