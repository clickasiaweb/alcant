<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Icon Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        .test-button {
            background: #007bff;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin: 10px;
            font-size: 16px;
        }
        .test-button:hover {
            background: #0056b3;
        }
        .status {
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
        }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        .debug {
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border-left: 4px solid #007bff;
        }
        pre {
            background: #f4f4f4;
            padding: 10px;
            border-radius: 4px;
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Search Icon Functionality Test</h1>
    
    <div class="status info">
        <strong>Testing Search Icon Components</strong><br>
        This test checks if the search icon click and search functionality is working properly.
    </div>
    
    <button class="test-button" onclick="testSearchIcon()">Test Search Icon Click</button>
    <button class="test-button" onclick="testSearchService()">Test Search Service</button>
    <button class="test-button" onclick="testSearchQuery()">Test Search Query: "19 pro"</button>
    <button class="test-button" onclick="clearCache()">Clear Cache</button>
    
    <div id="results"></div>

    <script>
        const API_BASE_URL = 'https://alcant-backend.vercel.app/api';
        let categoryCache = null;
        let categoryCachePromise = null;
        let categoryCacheTimestamp = 0;
        const CACHE_DURATION = 5 * 60 * 1000;
        
        // Simulate SearchContext functionality
        const searchContext = {
            isSearchOpen: false,
            searchQuery: '',
            searchResults: [],
            isSearching: false,
            
            openSearch() {
                console.log('=== OPEN SEARCH ===');
                this.isSearchOpen = true;
                console.log('Search dropdown opened');
                return true;
            },
            
            closeSearch() {
                console.log('=== CLOSE SEARCH ===');
                this.isSearchOpen = false;
                this.searchQuery = '';
                this.searchResults = [];
                console.log('Search dropdown closed');
                return true;
            },
            
            async handleSearch(query) {
                console.log('=== HANDLE SEARCH ===');
                console.log('Query:', query);
                
                this.searchQuery = query;
                
                if (!query || query.trim().length < 2) {
                    this.searchResults = [];
                    this.isSearching = false;
                    console.log('Query too short');
                    return [];
                }
                
                this.isSearching = true;
                console.log('Searching...');
                
                try {
                    const results = await this.searchProducts(query);
                    this.searchResults = results;
                    console.log('Search completed:', results);
                    return results;
                } catch (error) {
                    console.error('Search error:', error);
                    this.searchResults = [];
                    return [];
                } finally {
                    this.isSearching = false;
                }
            },
            
            async searchProducts(query) {
                if (!query || query.trim().length < 2) {
                    return [];
                }
                
                const url = `${API_BASE_URL}/products/search?q=${encodeURIComponent(query.trim())}&limit=5`;
                console.log('Search URL:', url);
                
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                const categoryMap = await this.getCategories();
                
                const transformedResults = (data.products || []).map(product => ({
                    id: product.id || product._id,
                    name: product.name,
                    category: categoryMap[product.category] || 'Unknown',
                    price: product.price || product.final_price || 0,
                    image: product.image || product.images?.[0] || 'https://picsum.photos/seed/product/60/60.jpg'
                }));
                
                return transformedResults;
            },
            
            async getCategories() {
                const now = Date.now();
                if (categoryCache && (now - categoryCacheTimestamp) < CACHE_DURATION) {
                    return categoryCache;
                }
                
                if (categoryCachePromise) return categoryCachePromise;
                
                categoryCachePromise = (async () => {
                    try {
                        const response = await fetch(`${API_BASE_URL}/categories`);
                        if (!response.ok) throw new Error('Failed to fetch categories');
                        
                        const data = await response.json();
                        const categories = data.categories || [];
                        
                        const categoryMap = {};
                        categories.forEach(cat => {
                            categoryMap[cat.id] = cat.name;
                        });
                        
                        categoryCache = categoryMap;
                        categoryCacheTimestamp = now;
                        return categoryMap;
                    } catch (error) {
                        console.error('Failed to fetch categories:', error);
                        return {};
                    }
                })();
                
                return categoryCachePromise;
            },
            
            clearCache() {
                categoryCache = null;
                categoryCachePromise = null;
                categoryCacheTimestamp = 0;
                console.log('Cache cleared');
            }
        };
        
        function updateResults(message, type = 'info') {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
        }
        
        function testSearchIcon() {
            try {
                const success = searchContext.openSearch();
                updateResults(`
                    <strong>Search Icon Test:</strong><br>
                    Status: ${success ? 'SUCCESS' : 'FAILED'}<br>
                    Search dropdown should be open: ${searchContext.isSearchOpen}<br>
                    <div class="debug">
                        <strong>Debug Info:</strong><br>
                        - openSearch() called: ${success}<br>
                        - isSearchOpen state: ${searchContext.isSearchOpen}<br>
                        - Search dropdown should appear in UI
                    </div>
                `, success ? 'success' : 'error');
            } catch (error) {
                updateResults(`
                    <strong>Search Icon Test:</strong><br>
                    Status: ERROR<br>
                    Error: ${error.message}
                `, 'error');
            }
        }
        
        async function testSearchService() {
            try {
                updateResults('<div class="status info">Testing search service...</div>');
                
                const testQuery = 'phone';
                const results = await searchContext.handleSearch(testQuery);
                
                updateResults(`
                    <strong>Search Service Test:</strong><br>
                    Query: "${testQuery}"<br>
                    Results: ${results.length} products found<br>
                    Status: SUCCESS<br>
                    <div class="debug">
                        <strong>Products found:</strong><br>
                        ${results.map(p => `- ${p.name} (${p.category}) - $${p.price}`).join('<br>')}
                    </div>
                `, results.length > 0 ? 'success' : 'error');
            } catch (error) {
                updateResults(`
                    <strong>Search Service Test:</strong><br>
                    Status: ERROR<br>
                    Error: ${error.message}
                `, 'error');
            }
        }
        
        async function testSearchQuery() {
            try {
                updateResults('<div class="status info">Testing search query "19 pro"...</div>');
                
                const results = await searchContext.handleSearch('19 pro');
                
                updateResults(`
                    <strong>Search Query Test ("19 pro"):</strong><br>
                    Results: ${results.length} products found<br>
                    Status: ${results.length > 0 ? 'SUCCESS' : 'NO RESULTS'}<br>
                    <div class="debug">
                        <strong>Expected:</strong> Should find "iPhone 19 Pro Case"<br>
                        <strong>Actual:</strong><br>
                        ${results.map(p => `- ${p.name} (${p.category}) - $${p.price}`).join('<br>') || 'No products found'}
                    </div>
                `, results.length > 0 ? 'success' : 'error');
            } catch (error) {
                updateResults(`
                    <strong>Search Query Test:</strong><br>
                    Status: ERROR<br>
                    Error: ${error.message}
                `, 'error');
            }
        }
        
        function clearCache() {
            searchContext.clearCache();
            searchContext.closeSearch();
            updateResults('<strong>Cache Cleared:</strong> Search cache and state reset', 'info');
        }
        
        // Initial state
        updateResults('Ready to test search functionality. Click the test buttons above.', 'info');
    </script>
</body>
</html>
